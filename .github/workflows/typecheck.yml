name: Type Check

on:
  pull_request:
    branches: [master, main]
    paths:
      - 'src/**/*.ts'
      - 'tsconfig.json'

env:
  NODE_VERSION: '20'

jobs:
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm exec tsc --noEmit 2>&1 | tee typecheck-output.txt

      - name: Summarize errors
        if: failure()
        run: |
          ERROR_COUNT=$(grep -c "error TS" typecheck-output.txt || echo "0")
          echo "## ❌ TypeScript Type Check Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Found **${ERROR_COUNT}** type error(s)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 typecheck-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
