name: Build and Release

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - pre-release
          - release

env:
  NODE_VERSION: '20'

jobs:
  # 构建和测试
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

      - name: Run linting
        run: pnpm run lint:check

      - name: Run tests
        run: pnpm test

      - name: Build extension
        run: pnpm run compile

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/
          retention-days: 7

  # 打包 VSIX
  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine package type
        id: package_type
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${RELEASE_TYPE}" == "pre-release" ]]; then
              echo "pre_release=true" >> $GITHUB_OUTPUT
            else
              echo "pre_release=false" >> $GITHUB_OUTPUT
            fi
          elif [[ "${GIT_REF}" == refs/tags/v*-* ]]; then
            echo "pre_release=true" >> $GITHUB_OUTPUT
          else
            echo "pre_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Package VSIX (pre-release)
        if: steps.package_type.outputs.pre_release == 'true'
        run: pnpm run package:pre-release

      - name: Package VSIX (release)
        if: steps.package_type.outputs.pre_release != 'true'
        run: pnpm run package

      - name: Get package info
        id: package_info
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "name=${PACKAGE_NAME}" >> $GITHUB_OUTPUT
          echo "version=${PACKAGE_VERSION}" >> $GITHUB_OUTPUT
          echo "vsix_file=${PACKAGE_NAME}-${PACKAGE_VERSION}.vsix" >> $GITHUB_OUTPUT

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: '*.vsix'
          retention-days: 30

    outputs:
      vsix_file: ${{ steps.package_info.outputs.vsix_file }}
      version: ${{ steps.package_info.outputs.version }}
      pre_release: ${{ steps.package_type.outputs.pre_release }}

  # 创建 GitHub Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'none')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Generate release notes
        id: release_notes
        env:
          PACKAGE_VERSION: ${{ needs.package.outputs.version }}
        run: |
          if [ -f "CHANGELOG.md" ]; then
            node scripts/generate-release-notes.js "${PACKAGE_VERSION}" CHANGELOG.md > release-notes.md
          else
            echo "## Release v${PACKAGE_VERSION}" > release-notes.md
            echo "" >> release-notes.md
            echo "See [CHANGELOG](./CHANGELOG.md) for details." >> release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.package.outputs.version }}
          body_path: release-notes.md
          files: ${{ needs.package.outputs.vsix_file }}
          prerelease: ${{ needs.package.outputs.pre_release == 'true' }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 发布到 VS Code Marketplace（可选）
  publish-marketplace:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    needs: [package, release]
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    environment: marketplace

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Publish to VS Code Marketplace
        env:
          VSIX_FILE: ${{ needs.package.outputs.vsix_file }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --packagePath "${VSIX_FILE}"

  # 发布到 Open VSX（可选）
  publish-openvsx:
    name: Publish to Open VSX
    runs-on: ubuntu-latest
    needs: [package, release]
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    environment: openvsx

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Publish to Open VSX
        env:
          VSIX_FILE: ${{ needs.package.outputs.vsix_file }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: pnpm exec ovsx publish "${VSIX_FILE}"
