name: Schema Validation

on:
  pull_request:
    branches: [master]
    paths:
      - 'schemas/**'
      - 'data/**/*.json'
  push:
    branches: [master]
    paths:
      - 'schemas/**'
      - 'data/**/*.json'

env:
  NODE_VERSION: '20'

jobs:
  validate:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Validate JSON syntax
        id: json-syntax
        run: |
          ERRORS=0
          echo "## JSON Syntax Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          # 检查所有 schema JSON 文件是否为合法 JSON
          for file in $(find schemas/ -name '*.json' 2>/dev/null | sort); do
            if ! node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" -- "$file" 2>/dev/null; then
              echo "::error file=${file}::Invalid JSON: ${file}"
              echo "| \`${file}\` | :x: Invalid |" >> "$GITHUB_STEP_SUMMARY"
              ERRORS=$((ERRORS + 1))
            else
              echo "✅ ${file}"
            fi
          done

          # 检查 data 目录下的 JSON 文件
          for file in $(find data/ -name '*.json' 2>/dev/null | sort); do
            if ! node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" -- "$file" 2>/dev/null; then
              echo "::error file=${file}::Invalid JSON: ${file}"
              echo "| \`${file}\` | :x: Invalid |" >> "$GITHUB_STEP_SUMMARY"
              ERRORS=$((ERRORS + 1))
            else
              echo "✅ ${file}"
            fi
          done

          if [ "${ERRORS}" -gt "0" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo ":x: **Found ${ERRORS} invalid JSON file(s)**" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Found ${ERRORS} invalid JSON file(s)"
            exit 1
          fi

          echo ":white_check_mark: All JSON files have valid syntax." >> "$GITHUB_STEP_SUMMARY"
          echo "✅ All JSON files have valid syntax."

      - name: Validate schema $schema property
        id: schema-property
        run: |
          WARNINGS=0
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Schema \$schema Property Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          for file in $(find schemas/ -name '*.schema.json' 2>/dev/null | sort); do
            HAS_SCHEMA=$(node -p "const s=JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'));s['\$schema']?'yes':'no'" -- "$file" 2>/dev/null || echo "error")
            if [ "${HAS_SCHEMA}" = "no" ]; then
              echo "::warning file=${file}::Missing \$schema property: ${file}"
              echo "| \`${file}\` | :warning: Missing \$schema |" >> "$GITHUB_STEP_SUMMARY"
              WARNINGS=$((WARNINGS + 1))
            fi
          done

          if [ "${WARNINGS}" -gt "0" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo ":warning: **${WARNINGS} schema file(s) missing \$schema property**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo ":white_check_mark: All schema files have \$schema property." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Validate schemas against JSON Schema draft-07
        id: schema-compliance
        run: |
          ERRORS=0
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## JSON Schema Draft-07 Compliance" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          for file in $(find schemas/ -name '*.schema.json' 2>/dev/null | sort); do
            if ajv compile -s "$file" --spec=draft7 --strict=false 2>/dev/null; then
              echo "✅ ${file}"
            else
              echo "::error file=${file}::Schema does not comply with draft-07: ${file}"
              echo "| \`${file}\` | :x: Non-compliant |" >> "$GITHUB_STEP_SUMMARY"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ "${ERRORS}" -gt "0" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo ":x: **${ERRORS} schema file(s) failed draft-07 validation**" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::${ERRORS} schema file(s) failed draft-07 validation"
            exit 1
          fi

          echo ":white_check_mark: All schemas comply with JSON Schema draft-07." >> "$GITHUB_STEP_SUMMARY"
          echo "✅ All schemas comply with JSON Schema draft-07."

      - name: Validate $ref references
        id: ref-check
        run: |
          ERRORS=0
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## \$ref Reference Integrity" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          node -e '
            const fs = require("fs");
            const path = require("path");

            let errors = 0;
            const summaryLines = [];

            // 递归收集所有 $ref
            function collectRefs(obj, filePath) {
              const refs = [];
              if (obj && typeof obj === "object") {
                for (const [key, value] of Object.entries(obj)) {
                  if (key === "$ref" && typeof value === "string") {
                    refs.push(value);
                  } else {
                    refs.push(...collectRefs(value, filePath));
                  }
                }
              }
              return refs;
            }

            // 查找所有 schema 文件
            function findFiles(dir, ext) {
              const results = [];
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) results.push(...findFiles(full, ext));
                else if (entry.name.endsWith(ext)) results.push(full);
              }
              return results;
            }

            const schemaFiles = findFiles("schemas", ".json");

            for (const file of schemaFiles) {
              const content = JSON.parse(fs.readFileSync(file, "utf8"));
              const refs = collectRefs(content, file);
              const dir = path.dirname(file);

              for (const ref of refs) {
                // 跳过纯内部引用 (#/$defs/xxx)
                if (ref.startsWith("#")) continue;

                // 分离文件路径和 fragment
                const [filePart] = ref.split("#");
                if (!filePart) continue;

                // 跳过 http(s) 外部引用
                if (filePart.startsWith("http://") || filePart.startsWith("https://")) continue;

                const resolved = path.resolve(dir, filePart);
                if (!fs.existsSync(resolved)) {
                  console.log(`::error file=${file}::Broken $ref: "${ref}" -> ${resolved} not found`);
                  summaryLines.push(`| \`${file}\` | \`${ref}\` | :x: Not found |`);
                  errors++;
                }
              }
            }

            if (errors > 0) {
              const summary = summaryLines.join("\n");
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,
                `| File | Reference | Status |\n|------|-----------|--------|\n${summary}\n\n:x: **${errors} broken $ref reference(s)**\n`);
              console.log(`::error::${errors} broken $ref reference(s)`);
              process.exit(1);
            }

            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,
              ":white_check_mark: All $ref references are valid.\n");
            console.log("✅ All $ref references are valid.");
          '

      - name: Validate data file structure
        id: data-structure
        run: |
          ERRORS=0
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Data File Structure Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          node -e '
            const fs = require("fs");
            const path = require("path");

            let errors = 0;
            const summaryLines = [];

            function findFiles(dir, ext) {
              const results = [];
              if (!fs.existsSync(dir)) return results;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) results.push(...findFiles(full, ext));
                else if (entry.name.endsWith(ext)) results.push(full);
              }
              return results;
            }

            // 检查重复 key
            function checkDuplicateKeys(text, file) {
              const dupes = [];
              JSON.parse(text, (key, value) => value);
              // JSON.parse 不会报重复 key，需要手动检测
              // 使用正则匹配顶层和嵌套 key 的简单检测
              const lines = text.split("\n");
              const keyStack = [];
              const seenAtLevel = [new Map()];
              let depth = 0;

              for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                // 跟踪大括号深度
                for (const ch of line) {
                  if (ch === "{" || ch === "[") {
                    depth++;
                    seenAtLevel[depth] = new Map();
                  } else if (ch === "}" || ch === "]") {
                    delete seenAtLevel[depth];
                    depth--;
                  }
                }
                // 匹配 key
                const match = line.match(/^\s*"([^"]+)"\s*:/);
                if (match) {
                  const key = match[1];
                  const level = seenAtLevel[depth] || new Map();
                  if (level.has(key)) {
                    dupes.push({ key, line: i + 1, prevLine: level.get(key) });
                  }
                  level.set(key, i + 1);
                  seenAtLevel[depth] = level;
                }
              }
              return dupes;
            }

            const dataFiles = findFiles("data", ".json");

            for (const file of dataFiles.sort()) {
              const text = fs.readFileSync(file, "utf8");

              // 检查空文件
              const trimmed = text.trim();
              if (!trimmed) {
                console.log(`::error file=${file}::Empty file: ${file}`);
                summaryLines.push(`| \`${file}\` | :x: Empty file |`);
                errors++;
                continue;
              }

              // 检查重复 key
              const dupes = checkDuplicateKeys(text, file);
              for (const d of dupes) {
                console.log(`::warning file=${file},line=${d.line}::Duplicate key "${d.key}" (first at line ${d.prevLine})`);
                summaryLines.push(`| \`${file}\` | :warning: Duplicate key "${d.key}" at line ${d.line} |`);
              }

              // 检查解析后是否为空对象/数组
              const parsed = JSON.parse(text);
              if (typeof parsed === "object" && parsed !== null && Object.keys(parsed).length === 0 && !Array.isArray(parsed)) {
                console.log(`::warning file=${file}::Empty object in: ${file}`);
                summaryLines.push(`| \`${file}\` | :warning: Empty object |`);
              }
            }

            if (errors > 0) {
              const summary = summaryLines.join("\n");
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,
                `| File | Issue |\n|------|-------|\n${summary}\n\n:x: **${errors} data file error(s)**\n`);
              console.log(`::error::${errors} data file error(s)`);
              process.exit(1);
            }

            if (summaryLines.length > 0) {
              const summary = summaryLines.join("\n");
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,
                `| File | Issue |\n|------|-------|\n${summary}\n\n:warning: **${summaryLines.length} warning(s)**\n`);
            } else {
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,
                ":white_check_mark: All data files have valid structure.\n");
            }
            console.log("✅ Data file structure validation complete.");
          '

      - name: Validation summary
        if: always()
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          SCHEMA_COUNT=$(find schemas/ -name '*.json' 2>/dev/null | wc -l)
          DATA_COUNT=$(find data/ -name '*.json' 2>/dev/null | wc -l)

          echo "**Total files validated**: ${SCHEMA_COUNT} schema + ${DATA_COUNT} data = $((SCHEMA_COUNT + DATA_COUNT)) files" >> "$GITHUB_STEP_SUMMARY"
